<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans SC",sans-serif;background:#f0f2f5;color:#333;min-height:100vh}
.container{max-width:780px;margin:0 auto;padding:24px 16px 60px}
h1{text-align:center;font-size:22px;color:#1a1a2e;margin-bottom:20px}
.card{background:#fff;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.08);padding:20px;margin-bottom:16px}
.import-area{text-align:center;padding:16px}
.import-area input{font-size:14px}
.stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.stat-item{text-align:center;min-width:80px}
.stat-item .num{font-size:26px;font-weight:700;color:#1a1a2e}
.stat-item .label{font-size:13px;color:#888;margin-top:2px}
.controls{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.btn{padding:8px 20px;border:none;border-radius:8px;font-size:14px;cursor:pointer;background:#e8e8e8;color:#333;transition:background .2s,opacity .2s}
.btn:hover{opacity:.85}
.btn-primary{background:#4a6cf7;color:#fff}
.btn-danger{background:#e74c5e;color:#fff}
.btn-success{background:#27ae60;color:#fff}
.btn:disabled{opacity:.5;cursor:default}
.progress-wrap{background:#e8e8e8;border-radius:99px;height:8px;overflow:hidden;margin:12px 0}
.progress-bar{height:100%;width:0;background:linear-gradient(90deg,#4a6cf7,#6c63ff);border-radius:99px;transition:width .3s}
.q-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.q-num{font-weight:700;font-size:15px;color:#1a1a2e}
.q-type{font-size:12px;padding:2px 10px;border-radius:99px;background:#eef0ff;color:#4a6cf7;font-weight:600}
.q-text{font-size:15px;line-height:1.7;margin-bottom:14px}
.options{display:flex;flex-direction:column;gap:8px}
.option{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-radius:8px;border:1.5px solid #e0e0e0;cursor:pointer;transition:background .15s;user-select:none}
.option:hover{background:#f7f8fc}
.option .key-badge{flex-shrink:0;width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:#eef0ff;color:#4a6cf7;font-weight:600;font-size:13px;transition:background .2s,color .2s}
.option .opt-text{font-size:14px;line-height:1.5;padding-top:3px}
.option.correct{border-color:#27ae60;background:#f0fff4}
.option.correct .key-badge{background:#27ae60;color:#fff}
.option.wrong{border-color:#e74c5e;background:#fff5f5}
.option.wrong .key-badge{background:#e74c5e;color:#fff}
.option.missed{border-color:#27ae60;background:#f0fff4;opacity:.7}
.option.missed .key-badge{background:#27ae60;color:#fff;opacity:.7}
.option.selected{border-color:#4a6cf7;background:#eef0ff;box-shadow:0 0 0 2px rgba(74,108,247,0.2)}
.nav{display:flex;gap:10px;justify-content:center;margin-top:16px}
.multi-confirm{text-align:center;margin-top:12px}
.hidden{display:none}
</style>
</head>
<body>
<div class="container" id="app">
  <h1>学习通选择题复习</h1>
  <div class="card import-area">
    <input type="file" id="file-input" accept=".json">
    <span style="margin-left:8px;color:#888;font-size:13px">选择 JSON 文件导入题库</span>
  </div>
  <div class="card" id="stats-card">
    <div class="stats">
      <div class="stat-item"><div class="num" id="total-q">0</div><div class="label">总题数</div></div>
      <div class="stat-item"><div class="num" id="correct-q">0</div><div class="label">已正确</div></div>
      <div class="stat-item"><div class="num" id="review-q">0</div><div class="label">待复习</div></div>
    </div>
    <div class="progress-wrap"><div class="progress-bar" id="progress-bar"></div></div>
  </div>
  <div class="card controls">
    <button class="btn btn-primary" id="all-btn">全部题目</button>
    <button class="btn btn-danger" id="wrong-btn">错题复习</button>
    <button class="btn btn-success" id="reset-btn">重新开始</button>
  </div>
  <div class="card" id="question-area">
    <div style="text-align:center;color:#888;padding:40px">请导入 JSON 题库文件</div>
  </div>
</div>
<script>
var questions = [];
var currentIdx = 0;
var correctSet = {};
var wrongSet = {};
var unknownSet = {};

var reviewMode = false;
var filtered = [];
var multiSelections = {};

function updateStats() {
  var total = questions.length;
  var correct = Object.keys(correctSet).length;
  var wrong = Object.keys(wrongSet).length;
  var review = total - correct - wrong;
  document.getElementById("total-q").textContent = total;
  document.getElementById("correct-q").textContent = correct;
  document.getElementById("review-q").textContent = review;
  var pct = total > 0 ? (correct / total * 100).toFixed(0) : 0;
  document.getElementById("progress-bar").style.width = pct + "%";
}

function buildFiltered() {
  if (reviewMode) {
    filtered = Object.keys(wrongSet).map(Number).sort(function(a,b){return a-b;});
  } else {
    filtered = questions.map(function(_, i) { return i; });
  }
}
function renderQuestion() {
  buildFiltered();
  if (filtered.length === 0) {
    document.getElementById("question-area").innerHTML = "<div style='text-align:center;color:#888;padding:40px'>暂无题目</div>";
    updateStats();
    return;
  }
  if (currentIdx >= filtered.length) currentIdx = filtered.length - 1;
  if (currentIdx < 0) currentIdx = 0;
  var qIdx = filtered[currentIdx];
  var q = questions[qIdx];
  var typeLabel = q.type === "single" ? "单选题" : "多选题";
  var correctAnswer = q.answer;
  var isSingle = q.type === "single";
  var isAnswered = correctSet.hasOwnProperty(qIdx) || wrongSet.hasOwnProperty(qIdx) || unknownSet.hasOwnProperty(qIdx);
  var wasCorrect = correctSet.hasOwnProperty(qIdx);
  var isUnknown = unknownSet.hasOwnProperty(qIdx);
  
  var html = "";
  html += '<div class="q-header">';
  html += '<span class="q-num">第 ' + (currentIdx + 1) + ' / ' + filtered.length + ' 题</span>';
  html += '<span class="q-type">' + typeLabel + '</span>';
  html += '<div style=text-align:center;margin-top:10px><input type=number id=jumpInput min=1 style=width:60px;padding:4px;border:1px solid #ddd;border-radius:4px> <button class=btn onclick=jumpTo() style=padding:4px 10px>跳转</button></div></div>';
  html += '<div class="q-text">' + q.text + '</div>';
  html += '<div class="options">';
  for (var i = 0; i < q.options.length; i++) {
    var opt = q.options[i];
    var cls = "option";
    if (isAnswered) {
      if (isSingle) {
        if (opt.key === correctAnswer) cls += " correct";
      } else {
        var ansChars = correctAnswer.split("");
        var selected = multiSelections[qIdx] || [];
        if (ansChars.indexOf(opt.key) >= 0 && selected.indexOf(opt.key) >= 0) cls += " correct";
        else if (ansChars.indexOf(opt.key) >= 0 && selected.indexOf(opt.key) < 0) cls += " missed";
        else if (ansChars.indexOf(opt.key) < 0 && selected.indexOf(opt.key) >= 0) cls += " wrong";
      }
    }
    var sa=multiSelections[qIdx]||[];if(sa.indexOf(opt.key)>=0)cls+=" selected";var onclick = "";
    if (!isAnswered) {
      if (isSingle) onclick = 'onclick="selectSingle(' + qIdx + ',\'' + opt.key + '\')"';
      else onclick = 'onclick="toggleMulti(' + qIdx + ',\'' + opt.key + '\')"';
    }
    html += '<div class="' + cls + '" ' + onclick + '><span class="key-badge">' + opt.key + '</span><span class="opt-text">' + opt.text + '</span></div>';
  }
  html += '</div>';
  if (!isSingle && !isAnswered) {
    var sel = multiSelections[qIdx] || [];
    html += '<div class="multi-confirm"><button class="btn btn-primary" onclick="confirmMulti(' + qIdx + ')" id="confirm-btn"' + (sel.length === 0 ? " disabled" : "") + '>确认选择</button></div>';
  }
  if (isAnswered) {
    var resultText = wasCorrect ? "&#x2705; 回答正确" : (isUnknown ? "&#x2753; 答案未知（抓取到的答案是\"" + correctAnswer + "\"）" : "&#x274C; 回答错误，正确答案：" + correctAnswer);
    html += '<div style="text-align:center;font-size:14px;margin-top:10px;font-weight:600;color:' + (wasCorrect ? '#27ae60' : (isUnknown ? '#f39c12' : '#e74c5e')) + '">' + resultText + '</div>';
    if (isUnknown) {
      html += "<div style=\"text-align:center;margin-top:8px\"><button class=\"btn btn-danger\" onclick=\"markWrong(" + qIdx + ")\">加入错题集</button></div>";
    }
  }
  html += '<div class="nav">';
  html += '<button class="btn" onclick="prevQuestion()" ' + (currentIdx <= 0 ? "disabled" : "") + '>上一题</button>';
  html += '<button class="btn" onclick="nextQuestion()" ' + (currentIdx >= filtered.length - 1 ? "disabled" : "") + '>下一题</button>';
  html += '</div>';
  document.getElementById("question-area").innerHTML = html;
  updateStats();
}
function selectSingle(qIdx, key) {
  var q = questions[qIdx];
  if (!/^[A-Za-z]+$/.test(q.answer)) {
    unknownSet[qIdx] = true;
    multiSelections[qIdx] = [key];
    renderQuestion();
    return;
  }
  if (key === q.answer) { correctSet[qIdx] = true; delete wrongSet[qIdx]; }
  else { wrongSet[qIdx] = true; delete correctSet[qIdx]; multiSelections[qIdx] = [key]; }
  renderQuestion();
}

function markWrong(qIdx) {
  wrongSet[qIdx] = true;
  delete unknownSet[qIdx];
  renderQuestion();
}

function toggleMulti(qIdx, key) {
  if (!multiSelections[qIdx]) multiSelections[qIdx] = [];
  var idx = multiSelections[qIdx].indexOf(key);
  if (idx >= 0) multiSelections[qIdx].splice(idx, 1);
  else multiSelections[qIdx].push(key);
  renderQuestion();
}

function confirmMulti(qIdx) {
  var sel = (multiSelections[qIdx] || []).slice().sort();
  var ans = questions[qIdx].answer.split("").sort();
  var isCorrect = sel.length === ans.length && sel.every(function(v,i){return v===ans[i];});
  if (isCorrect) { correctSet[qIdx] = true; delete wrongSet[qIdx]; }
  else { wrongSet[qIdx] = true; delete correctSet[qIdx]; }
  renderQuestion();
}

function prevQuestion() { if (currentIdx > 0) { currentIdx--; renderQuestion(); } }
function nextQuestion() { if (currentIdx < filtered.length - 1) { currentIdx++; renderQuestion(); } }
function switchAll() { reviewMode = false; currentIdx = 0; renderQuestion(); }
function switchWrong() { reviewMode = true; currentIdx = 0; renderQuestion(); }
function jumpTo(){var v=document.getElementById("jumpInput").value;if(!v)return;var n=parseInt(v);if(n<1||n>filtered.length)return;currentIdx=n-1;renderQuestion()}
function resetAll() { correctSet = {}; wrongSet = {};  multiSelections = {}; reviewMode = false; currentIdx = 0; renderQuestion(); }

function loadFromJson(data) {
  questions = JSON.parse(data);
  // 规范化答案格式：处理判断题等提取异常（answer为"?"或数字索引）
  questions.forEach(function(q) {
    if (q.type === "single" && q.options && q.options.length > 0) {
      var ans = q.answer;
      if (/^\d+$/.test(ans)) {
        var idx = parseInt(ans, 10);
        if (idx >= 1 && idx <= q.options.length) {
          q.answer = q.options[idx - 1].key;
        }
      }
    }
  });
  correctSet = {}; wrongSet = {};  multiSelections = {}; reviewMode = false; currentIdx = 0;
  filtered = questions.map(function(_,i){return i;});
  renderQuestion();
}

document.getElementById("all-btn").onclick = switchAll;
document.getElementById("wrong-btn").onclick = switchWrong;
document.getElementById("reset-btn").onclick = resetAll;
document.getElementById("file-input").addEventListener("change", function(e) {
  var file = e.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    try { loadFromJson(ev.target.result); }
    catch(err) { alert("JSON 解析失败: " + err.message); }
  };
  reader.readAsText(file, "UTF-8");
  e.target.value = "";
});

loadFromJson(questionDataString);</script>
